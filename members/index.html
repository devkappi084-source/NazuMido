<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NazuMido – Mitgliederbereich</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0e0e14;--card:#16161e;--border:#2a2a3a;--input:#1e1e28;
      --red:#c41e2b;--red-l:#e02535;--red-faint:rgba(196,30,43,.12);
      --text:#e8e8f0;--muted:#7878a0;--dim:#4a4a6a;
      --font:'Inter',system-ui,sans-serif;--display:'Cinzel',serif;
      --radius:8px;--radius-sm:5px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;}
    a{color:var(--red-l);}
    ::-webkit-scrollbar{width:5px;} ::-webkit-scrollbar-thumb{background:#333350;border-radius:3px;}

    /* ── Login ── */
    .login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;
      background:radial-gradient(ellipse 60% 60% at 30% 40%,rgba(196,30,43,.18) 0%,transparent 70%),
                 radial-gradient(ellipse 50% 50% at 70% 60%,rgba(26,102,40,.12) 0%,transparent 70%),var(--bg);}
    .login-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:40px 36px;width:100%;max-width:380px;text-align:center;}
    .login-crown{font-size:3rem;color:var(--red);margin-bottom:10px;display:block;}
    .login-title{font-family:var(--display);font-size:1.6rem;font-weight:700;color:var(--red);letter-spacing:4px;}
    .login-sub{font-size:.75rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:28px;}
    .form-group{margin-bottom:16px;text-align:left;}
    .form-group label{display:block;font-size:.78rem;font-weight:500;color:var(--muted);margin-bottom:6px;}
    .form-group input{width:100%;padding:11px 14px;background:var(--input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:.88rem;outline:none;transition:border-color .2s;}
    .form-group input:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(196,30,43,.15);}
    .btn-primary{width:100%;padding:13px;background:var(--red);color:white;border:none;border-radius:var(--radius-sm);font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:var(--font);}
    .btn-primary:hover{background:var(--red-l);}
    .error-msg{background:rgba(196,30,43,.2);border:1px solid rgba(196,30,43,.35);color:#ff8888;padding:10px 14px;border-radius:var(--radius-sm);font-size:.85rem;margin-bottom:16px;}

    /* ── App chrome ── */
    .app{display:flex;flex-direction:column;min-height:100vh;}
    nav.topnav{background:rgba(10,10,16,.95);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(16px);}
    .nav-brand{font-family:var(--display);color:var(--red);font-size:1rem;letter-spacing:3px;}
    .nav-user{display:flex;align-items:center;gap:10px;font-size:.85rem;color:var(--muted);}
    .nav-avatar{width:30px;height:30px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;color:white;}
    .btn-logout{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:var(--radius-sm);cursor:pointer;font-size:.78rem;transition:all .2s;}
    .btn-logout:hover{border-color:var(--muted);color:var(--text);}

    /* ── Content ── */
    .container{max-width:1100px;margin:0 auto;padding:32px 24px;}
    h1.page-title{font-family:var(--display);font-size:1.4rem;color:var(--red);letter-spacing:3px;margin-bottom:6px;}
    .page-sub{font-size:.85rem;color:var(--muted);margin-bottom:28px;}

    /* ── Event list ── */
    .event-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
    .event-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:border-color .2s;}
    .event-card:hover{border-color:var(--red);}
    .event-card-date{font-size:.75rem;color:var(--muted);margin-bottom:6px;}
    .event-card-title{font-size:.95rem;font-weight:600;margin-bottom:6px;}
    .event-card-count{font-size:.78rem;color:var(--muted);}
    .badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:.65rem;font-weight:600;letter-spacing:.8px;text-transform:uppercase;}
    .badge-highlight{background:rgba(196,30,43,.2);color:#ff7788;}
    .badge-ball{background:rgba(74,16,112,.3);color:#cc88ff;}
    .badge-familie{background:rgba(26,100,40,.3);color:#66cc77;}
    .badge-abschluss{background:rgba(60,80,180,.3);color:#88aaff;}
    .badge-sonstig{background:rgba(80,80,80,.3);color:#aaa;}

    /* ── Photo gallery ── */
    .back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:.85rem;cursor:pointer;margin-bottom:20px;background:none;border:none;padding:0;}
    .back-btn:hover{color:var(--text);}
    .photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
    .photo-item{position:relative;aspect-ratio:1;border-radius:var(--radius-sm);overflow:hidden;cursor:pointer;background:var(--input);}
    .photo-item img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .2s;}
    .photo-item:hover img{transform:scale(1.04);}
    .photo-dl{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.7);color:white;border:none;border-radius:3px;padding:5px 10px;font-size:.75rem;cursor:pointer;opacity:0;transition:opacity .2s;}
    .photo-item:hover .photo-dl{opacity:1;}
    .preview-badge{position:absolute;top:4px;left:4px;background:rgba(0,0,0,.6);color:#aaa;font-size:.6rem;padding:2px 5px;border-radius:2px;}

    /* ── Loading/empty ── */
    .spinner{display:inline-block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;margin:40px auto;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .center{text-align:center;padding:40px;color:var(--muted);}
    .flash{padding:12px 20px;font-size:.85rem;margin-bottom:0;}
    .flash-error{background:rgba(196,30,43,.2);color:#ff8888;border-bottom:1px solid rgba(255,136,136,.2);}
    .flash-success{background:rgba(26,102,40,.25);color:#6adf7a;border-bottom:1px solid rgba(106,223,122,.2);}

    @media(max-width:600px){.container{padding:20px 16px;}.photo-grid{grid-template-columns:repeat(2,1fr);}}
  </style>
</head>
<body>

<!-- Login -->
<div id="login-view" class="login-wrap">
  <div style="padding:24px;width:100%;max-width:420px">
    <div class="login-card">
      <span class="login-crown">♛</span>
      <h1 class="login-title">NAZUMIDO</h1>
      <p class="login-sub">Mitgliederbereich</p>
      <div id="login-error" class="error-msg" style="display:none"></div>
      <form id="login-form">
        <div class="form-group"><label>E-Mail</label><input type="email" id="m-email" autocomplete="email" required></div>
        <div class="form-group"><label>Passwort</label><input type="password" id="m-pw" autocomplete="current-password" required></div>
        <button type="submit" class="btn-primary" id="login-btn">Anmelden</button>
      </form>
    </div>
  </div>
</div>

<!-- App -->
<div id="app-view" class="app" style="display:none">
  <div id="flash-bar"></div>
  <nav class="topnav">
    <span class="nav-brand">NAZUMIDO</span>
    <div class="nav-user">
      <div class="nav-avatar" id="user-avatar">M</div>
      <span id="user-name">Mitglied</span>
      <button class="btn-logout" onclick="doLogout()">Abmelden</button>
    </div>
  </nav>
  <div class="container" id="app-content"></div>
</div>

<script src="js/app.js"></script>
</body>
</html>
